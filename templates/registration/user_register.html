{% extends 'main.html' %}

{% block content %}
    <div class="card mb-3 border-0 nth-shadow">
        <div class="card-body">
            <div class="card-title nth-card-title">
                <h4>Регистрация на сайте</h4>
            </div>
            <form method="post" action="{% url 'register' %}">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-dark mt-2 mb-2">Зарегистрироваться</button>
            </form>
            <a class="link-opacity-75 link-offset-2" href="{% url 'login' %}">Перейдите на страницу авторизации, если у
                вас уже есть аккаунт</a>
        </div>
    </div>
{% endblock %}
