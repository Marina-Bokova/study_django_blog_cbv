{% extends 'main.html' %}

{% block content %}
    <div class="card mb-3 border-0 nth-shadow">
        <div class="card-body">
            <div class="card-title nth-card-title">
                <h4>Забыли пароль?</h4>
            </div>
            <p>Введите ниже свой адрес электронной почты, и мы вышлем вам инструкции по восстановлению пароля.</p>
            <form method="post" action="{% url 'password_reset' %}">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-grid gap-2 d-md-block mt-2">
                <button type="submit" class="btn btn-dark">Отправить инструкцию на почту</button>
             </div>
            </form>
        </div>
    </div>
{% endblock %}
